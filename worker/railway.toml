# Railway: set Root Directory to `worker` (or deploy this folder as the service).
# Docs: https://docs.railway.com/

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node src/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# If the UI builder is Nixpacks/Railpack instead of Docker, pin Node 22
# (supabase-js needs native WebSocket — Node 20 crashes on createClient).
